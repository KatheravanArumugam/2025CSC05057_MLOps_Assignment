
# GitHub Actions workflow for the Heart Disease MLOps project.
#
# Mirrors the stages defined in the Jenkinsfile so the project can run CI/CD
# on either platform.
#
# Optional repository secrets (configure under: Settings -> Secrets and variables -> Actions):
#   - DOCKERHUB_USERNAME   -- only if pushing to DockerHub
#   - DOCKERHUB_TOKEN      -- only if pushing to DockerHub
#
# Branch strategy:
#   - Lint + tests + train run on every push and pull request.
#   - Docker image build runs on every push to `main`.
#   - Docker image push runs on `main` only when DockerHub secrets are set.

name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  IMAGE_REPO: heart-disease-api

jobs:
  lint-and-test:
    name: Lint & Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<81"
          pip install -r requirements.txt

      - name: Lint (flake8)
        run: flake8 src tests

      - name: Download data
        run: python -m src.data.download_data

      - name: Run pytest with coverage
        run: |
          mkdir -p reports
          pytest --junitxml=reports/junit.xml --cov=src --cov-report=xml:reports/coverage.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/

  train:
    name: Train model
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<81"
          pip install -r requirements.txt

      - name: Download data
        run: python -m src.data.download_data

      - name: Reset MLflow tracking dir
        run: rm -rf mlruns

      - name: Train model
        run: python -m src.models.train

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            models/*.pkl
            models/metrics.json
            mlruns/**

  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: train
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Compute image name
        id: image
        run: |
          if [ -n "${DOCKERHUB_USERNAME}" ]; then
            echo "name=${DOCKERHUB_USERNAME}/${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "name=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (and optionally push) image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/Dockerfile
          push: ${{ steps.image.outputs.push == 'true' }}
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.run_number }}
            ${{ steps.image.outputs.name }}:latest
