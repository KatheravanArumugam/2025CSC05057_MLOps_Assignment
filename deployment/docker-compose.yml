# Local stack: API + Prometheus + Grafana
# Usage (from repo root):
#   docker compose -f deployment/docker-compose.yml up --build
#
# - API           -> http://localhost:8000  (docs at /docs)
# - Prometheus    -> http://localhost:9090
# - Grafana       -> http://localhost:3000  (admin / admin)
services:
  api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    image: heart-disease-api:latest
    container_name: heart-disease-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_VERSION=v1
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: prometheus
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ../monitoring/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ../monitoring/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ../monitoring/grafana/heart_disease_dashboard.json:/var/lib/grafana/dashboards/heart_disease_dashboard.json:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
